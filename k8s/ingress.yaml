apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enterprise-hub-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: enterprise-hub.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: enterprise-hub-service
            port:
              number: 80
